{% set name = "clad" %}
{% set version = "1.4" %}
{% set build_number = 2 %}

{% set clang_ver = (clangdev or "None").split(".")[0] %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/vgvassilev/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: da5584159499b05d77cfca40baee5d4d212beb269637736fee34d84d2b82d419
  folder: source

build:
  skip: true  # [win]
  number: {{ build_number }}
  string: clang{{ clang_ver }}_h{{ PKG_HASH }}_{{ build_number }}
  ignore_run_exports_from:
    - xz      # [unix]
    - zstd    # [unix]

requirements:
  build:
    - git
    - cmake
    - make   # [unix]
    - ninja  # [win]
    - {{ compiler('cxx') }}  # [clangdev != "7.*" and clangdev != "8.*" and clangdev != "9.*"]
    - libstdcxx-devel_{{ target_platform }}  # [linux and (clangdev == "7.*" or clangdev == "8.*" or clangdev == "9.*")]
    - sed    # [unix]
    # LLVM was split into multiple outputs as part of the 8.x update
    - llvm  # [llvmdev != "7.*"]
    - llvmdev
    - clangdev ={{ clang_ver }}
    - llvm-tools  # [llvmdev != "7.*"] # FileCheck
    - lit
    - libcxx {{ cxx_compiler_version }}  # [osx]
  host:
    - xz
    - zstd
  run:
    - __osx >={{ MACOSX_DEPLOYMENT_TARGET|default("13.0") }}  # [osx]
  run_constrained:
    - cling ==9999999999  # [clangdev != "9.*"]
    - cling 0.9           # [clangdev == "9.*"]
    - clangdev ={{ clang_ver }}

test:
  requires:
    - lit
    - llvm-tools  # [llvmdev != "7.*"] # FileCheck
    - clangdev ={{ clang_ver }}
    - libstdcxx-devel_{{ target_platform }}  # [linux]
    - libcxx {{ cxx_compiler_version }}  # [osx]
    - jupyter_kernel_test  # [clangdev == "9.*" and not win]
    - {{ compiler('cxx') }}
    # LLVM was split into multiple outputs as part of the 8.x update
    - llvm  # [llvmdev != "7.*"]
    - llvmdev
#    - xeus-cling           # [clangdev == "9.*" and not win]
#    - xeus-cpp

  files:
    - $RECIPE_DIR/jupyter_Clad_kernel_test.py
    - test.cpp

  source_files:
    - source/test

about:
  home: https://github.com/vgvassilev/clad
  license: LGPL-2.0-or-later
  license_family: LGPL
  license_file: source/License.txt
  summary: clad -- automatic differentiation for C/C++
  description: |
    Clad enables automatic differentiation (AD) for C++. It is based on LLVM
    compiler infrastructure and is a plugin for Clang compiler.
  doc_url: https://clad.readthedocs.io/en/latest/index.html
  dev_url: https://clad.readthedocs.io/en/latest/user/DevelopersDocumentation.html

extra:
  recipe-maintainers:
    - vgvassilev
    - alexander-penev
    - oshadura
